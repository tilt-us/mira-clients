name: Release

on:
  workflow_run:
    workflows:
      - CI/CD
    types:
      - completed
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      should_release: ${{ steps.release.outputs.should_release }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      head_sha: ${{ steps.release.outputs.head_sha }}
      notes: ${{ steps.release.outputs.notes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Calculate version and notes
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          git fetch --tags --force

          head_sha="${HEAD_SHA}"
          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n 1 || true)"
          head_tag="$(git tag --points-at "${head_sha}" \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n 1 || true)"

          if [[ -n "${head_tag}" ]]; then
            previous_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | grep -v -x "${head_tag}" \
              | sort -V \
              | tail -n 1 || true)"
            base_version="${head_tag#v}"
            if [[ -n "${previous_tag}" ]]; then
              log_range="${previous_tag}..${head_sha}"
              changes_title="Änderungen seit ${previous_tag}"
            else
              log_range="${head_sha}"
              changes_title="Änderungen"
            fi
          elif [[ -n "${latest_tag}" ]]; then
            base_version="${latest_tag#v}"
            log_range="${latest_tag}..${head_sha}"
            changes_title="Änderungen seit ${latest_tag}"
          else
            base_version="kein vorheriger Release"
            log_range="${head_sha}"
            changes_title="Änderungen"
          fi

          if ! pr_title="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${REPOSITORY}/commits/${head_sha}/pulls" \
            --jq 'sort_by(.merged_at // .updated_at) | reverse | .[0].title // ""' \
            2>/dev/null)"; then
            pr_title=""
          fi

          if [[ -z "${pr_title}" ]]; then
            pr_title="$(git log -1 --format=%s "${head_sha}")"
          fi

          if [[ -n "${head_tag}" ]]; then
            version="${head_tag#v}"
          elif [[ -z "${latest_tag}" ]]; then
            version="1.0.0"
          else
            IFS=. read -r major minor patch <<< "${base_version}"
            case "${pr_title,,}" in
              feat*) minor=$((minor + 1)); patch=0 ;;
              fix*|chore*|doc*|ci*|ref*) patch=$((patch + 1)) ;;
              *) patch=$((patch + 1)) ;;
            esac

            version="${major}.${minor}.${patch}"
          fi
          tag="v${version}"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tag_sha="$(git rev-list -n 1 "${tag}")"
            if [[ "${tag_sha}" != "${head_sha}" ]]; then
              echo "Tag ${tag} exists on ${tag_sha}, not ${head_sha}."
              echo "should_release=false" >> "${GITHUB_OUTPUT}"
              echo "version=${version}" >> "${GITHUB_OUTPUT}"
              echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
              echo "head_sha=${head_sha}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          notes_file="$(mktemp)"
          {
            echo "## ${changes_title}"
            echo
            echo "Basisversion: ${base_version}"
            echo "PR-Titel: ${pr_title}"
            echo
            echo "## Commits"
            git log --reverse --format='- `%h` %s - gepusht von %an' "${log_range}"
          } > "${notes_file}"

          {
            echo "should_release=true"
            echo "version=${version}"
            echo "tag=${tag}"
            echo "head_sha=${head_sha}"
            echo "notes<<EOF"
            cat "${notes_file}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  build-mira-game-client:
    name: Build mira-game-client (${{ matrix.label }})
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxi-dev \
            libxrandr-dev \
            pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build
        run: cargo build --release --locked -p mira-game-client

      - name: Stage artifact
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          LABEL: ${{ matrix.label }}
        run: |
          set -euo pipefail
          ext=""
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            ext=".exe"
          fi

          mkdir -p dist
          cp "target/release/mira-game-client${ext}" "dist/mira-game-client-${VERSION}-${LABEL}${ext}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mira-game-client-${{ matrix.label }}
          path: dist/*
          if-no-files-found: error

  build-mira-client:
    name: Build mira-client (${{ matrix.label }})
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            bundles: deb,appimage
          - os: windows-latest
            label: windows
            bundles: msi,nsis
          - os: macos-latest
            label: macos
            bundles: dmg

    defaults:
      run:
        working-directory: apps/mira-client
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libgl1-mesa-dev \
            libudev-dev \
            pkg-config

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/mira-client/package-lock.json

      - name: Setup npm
        run: npm install -g npm@11

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/mira-client/src-tauri -> apps/mira-client/src-tauri/target

      - name: Install dependencies
        run: npm ci

      - name: Apply release version
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const version = process.env.VERSION;

          function writeJson(path, update) {
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            update(data);
            fs.writeFileSync(path, `${JSON.stringify(data, null, 2)}\n`);
          }

          writeJson('package.json', data => {
            data.version = version;
          });

          writeJson('package-lock.json', data => {
            data.version = version;
            if (data.packages?.['']) {
              data.packages[''].version = version;
            }
          });

          writeJson('src-tauri/tauri.conf.json', data => {
            data.version = version;
          });

          const cargoPath = 'src-tauri/Cargo.toml';
          const cargo = fs.readFileSync(cargoPath, 'utf8')
            .replace(/^version = ".*"$/m, `version = "${version}"`);
          fs.writeFileSync(cargoPath, cargo);
          NODE

      - name: Build
        env:
          BUNDLES: ${{ matrix.bundles }}
        run: npm run tauri -- build --bundles "${BUNDLES}" --ci

      - name: Stage artifact
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          LABEL: ${{ matrix.label }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p dist
          while IFS= read -r -d '' asset; do
            name="$(basename "${asset}" | tr ' ' '-')"
            cp "${asset}" "dist/mira-client-${VERSION}-${LABEL}-${name}"
          done < <(find src-tauri/target/release/bundle -type f \
            \( -name '*.deb' \
            -o -name '*.AppImage' \
            -o -name '*.msi' \
            -o -name '*.exe' \
            -o -name '*.dmg' \) \
            -print0)

          if [[ -z "$(find dist -type f -print -quit)" ]]; then
            echo "No mira-client release bundles found."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mira-client-${{ matrix.label }}
          path: apps/mira-client/dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - build-mira-game-client
      - build-mira-client
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
          HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
          NOTES: ${{ needs.prepare.outputs.notes }}
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          printf '%s\n' "${NOTES}" > release-notes.md

          assets=(release-artifacts/**/*)
          files=()
          for asset in "${assets[@]}"; do
            if [[ -f "${asset}" ]]; then
              files+=("${asset}")
            fi
          done

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "${TAG}" --repo "${REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --repo "${REPOSITORY}" \
              --target "${HEAD_SHA}" \
              --title "${TAG}" \
              --notes-file release-notes.md
          else
            gh release create "${TAG}" \
              --repo "${REPOSITORY}" \
              --target "${HEAD_SHA}" \
              --title "${TAG}" \
              --notes-file release-notes.md
          fi

          release_id="$(gh api "/repos/${REPOSITORY}/releases/tags/${TAG}" --jq '.id')"
          for asset_id in $(gh api --paginate "/repos/${REPOSITORY}/releases/${release_id}/assets" --jq '.[].id'); do
            gh api -X DELETE "/repos/${REPOSITORY}/releases/assets/${asset_id}" >/dev/null
          done

          gh release upload "${TAG}" "${files[@]}" \
            --repo "${REPOSITORY}" \
            --clobber

  deploy-download-host:
    name: Deploy download host files
    needs:
      - prepare
      - publish
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DOWNLOAD_DEPLOY_HOST || secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DOWNLOAD_DEPLOY_USER || secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DOWNLOAD_DEPLOY_PORT || secrets.DEPLOY_PORT || '22' }}
      DOWNLOAD_DEPLOY_PATH: ${{ secrets.DOWNLOAD_DEPLOY_PATH || '/srv/mira/downloads/mira/game-sources' }}
      PUBLIC_DOWNLOAD_BASE_URL: ${{ secrets.PUBLIC_DOWNLOAD_BASE_URL || 'https://api.tilt-us.com/downloads/mira/game-sources' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Install upload tools
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client rsync zip

      - name: Prepare download packages
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
        run: |
          set -euo pipefail

          release_dir="download-host/releases/${TAG}"
          rm -rf download-host
          mkdir -p "${release_dir}/mira-client" "${release_dir}/mira-game-client" "${release_dir}/assets"

          while IFS= read -r -d '' asset; do
            artifact_group="${asset#release-artifacts/}"
            artifact_group="${artifact_group%%/*}"
            case "${artifact_group}" in
              mira-client-*)
                cp "${asset}" "${release_dir}/mira-client/"
                ;;
              mira-game-client-*)
                cp "${asset}" "${release_dir}/mira-game-client/"
                ;;
            esac
          done < <(find release-artifacts -type f -print0)

          rsync -a assets/ "${release_dir}/assets/"

          for required_dir in mira-client mira-game-client assets; do
            if [[ -z "$(find "${release_dir}/${required_dir}" -type f -print -quit)" ]]; then
              echo "${required_dir} has no files."
              exit 1
            fi
          done

          (
            cd "${release_dir}/mira-client"
            zip -qr "../mira-client-${TAG}.zip" .
          )
          (
            cd "${release_dir}/mira-game-client"
            zip -qr "../mira-game-client-${TAG}.zip" .
          )
          (
            cd "${release_dir}/assets"
            zip -qr "../assets-${TAG}.zip" .
          )
          (
            cd "${release_dir}"
            zip -qr "mira-${TAG}.zip" mira-client mira-game-client assets
          )

          node - <<'NODE'
          const crypto = require('node:crypto');
          const fs = require('node:fs');
          const path = require('node:path');

          const tag = process.env.TAG;
          const version = process.env.VERSION;
          const commit = process.env.HEAD_SHA;
          const baseUrl = process.env.PUBLIC_DOWNLOAD_BASE_URL.replace(/\/$/, '');
          const deployRoot = 'download-host';
          const releaseRoot = path.join(deployRoot, 'releases', tag);

          function walk(dir) {
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap(entry => {
              const entryPath = path.join(dir, entry.name);
              return entry.isDirectory() ? walk(entryPath) : [entryPath];
            });
          }

          function sha256(file) {
            return crypto.createHash('sha256').update(fs.readFileSync(file)).digest('hex');
          }

          const files = walk(releaseRoot)
            .filter(file => !file.endsWith('manifest.json'))
            .map(file => {
              const relativePath = path.relative(deployRoot, file).split(path.sep).join('/');
              const releasePath = path.relative(releaseRoot, file).split(path.sep).join('/');
              const stats = fs.statSync(file);
              return {
                path: releasePath,
                url: `${baseUrl}/${relativePath}`,
                size: stats.size,
                sha256: sha256(file),
              };
            })
            .sort((left, right) => left.path.localeCompare(right.path));

          const manifest = {
            version,
            tag,
            commit,
            publishedAt: new Date().toISOString(),
            baseUrl: `${baseUrl}/releases/${tag}`,
            files,
          };

          fs.writeFileSync(
            path.join(releaseRoot, 'manifest.json'),
            `${JSON.stringify(manifest, null, 2)}\n`,
          );

          fs.writeFileSync(
            path.join(deployRoot, 'latest.json'),
            `${JSON.stringify({
              version,
              tag,
              commit,
              manifestUrl: `${baseUrl}/releases/${tag}/manifest.json`,
            }, null, 2)}\n`,
          );
          NODE

      - name: Prepare SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DOWNLOAD_DEPLOY_SSH_KEY || secrets.DEPLOY_SSH_KEY }}

      - name: Ensure deploy host key is known
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_HOST}" || -z "${DEPLOY_USER}" ]]; then
            echo "DEPLOY_HOST and DEPLOY_USER are required."
            exit 1
          fi

          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Upload download files
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail

          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${DOWNLOAD_DEPLOY_PATH}/releases/${TAG}'"

          rsync -az --delete \
            -e "ssh -p ${DEPLOY_PORT} -o StrictHostKeyChecking=yes" \
            "download-host/releases/${TAG}/" \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DOWNLOAD_DEPLOY_PATH}/releases/${TAG}/"

          rsync -az \
            -e "ssh -p ${DEPLOY_PORT} -o StrictHostKeyChecking=yes" \
            "download-host/latest.json" \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DOWNLOAD_DEPLOY_PATH}/latest.json.tmp"

          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mv '${DOWNLOAD_DEPLOY_PATH}/latest.json.tmp' '${DOWNLOAD_DEPLOY_PATH}/latest.json' && chmod -R a+rX '${DOWNLOAD_DEPLOY_PATH}'"
