<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mira Login</title>
    <style>
      :root {
        --mira-oauth-accent: #f2c45b;
        --mira-oauth-foreground: #101216;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 38%, rgba(242, 196, 91, 0.12), transparent 32%),
          #101216;
      }

      body {
        display: grid;
        place-items: center;
      }

      .loader {
        display: grid;
        gap: 18px;
        place-items: center;
      }

      .mark {
        display: grid;
        width: 58px;
        height: 58px;
        place-items: center;
        border-radius: 10px;
        color: var(--mira-oauth-foreground);
        background: var(--mira-oauth-accent);
        font: 800 28px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .spinner {
        width: 46px;
        height: 46px;
        border: 4px solid rgba(237, 242, 247, 0.16);
        border-top-color: var(--mira-oauth-accent);
        border-radius: 999px;
        box-shadow: 0 0 22px color-mix(in srgb, var(--mira-oauth-accent) 45%, transparent);
        animation: mira-oauth-spin 0.8s linear infinite;
      }

      @keyframes mira-oauth-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="loader" aria-label="Loading">
      <div class="mark" aria-hidden="true">M</div>
      <div class="spinner" aria-hidden="true"></div>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const authUrl = params.get("authUrl");
      const accent = params.get("accent");
      const foreground = params.get("fontColor");

      if (accent && /^#[0-9a-fA-F]{6}$/.test(accent)) {
        document.documentElement.style.setProperty("--mira-oauth-accent", accent);
      }

      if (foreground === "white") {
        document.documentElement.style.setProperty("--mira-oauth-foreground", "#ffffff");
      } else if (foreground === "black") {
        document.documentElement.style.setProperty("--mira-oauth-foreground", "#101216");
      }

      if (authUrl) {
        window.setTimeout(() => {
          window.location.replace(authUrl);
        }, 80);
      }
    </script>
  </body>
</html>
